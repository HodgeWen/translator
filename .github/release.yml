changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: Features
      labels:
        - feat
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - fix
        - bug
    - title: Performance
      labels:
        - perf
        - performance
    - title: Refactors
      labels:
        - refactor
    - title: Docs
      labels:
        - docs
    - title: Chore / CI
      labels:
        - chore
        - ci
        - build
        - dependencies
    - title: Other Changes
      labels:
        - "*"
